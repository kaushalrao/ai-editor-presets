name: Publish Release (Post-Merge Tagging)

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag-and-release:
    # Only run if the PR was merged and has the 'release' label we applied in release.yml
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "TAG_NAME=v$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if Version exists on NPM
        id: check_npm
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          # Check if the exact version exists in the registry
          if npm view ai-editor-presets@$VERSION version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on NPM. Skipping publish."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION does not exist on NPM. Proceeding to publish."
          fi

      - name: Install Dependencies
        if: steps.check_npm.outputs.exists == 'false'
        run: npm install

      - name: Publish to NPM
        if: steps.check_npm.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release & Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: ${{ steps.get_version.outputs.TAG_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
