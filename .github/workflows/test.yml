name: AI Commons CI

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
    branches: [ develop, main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-cli-compilation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Markdown Linting
      run: npm run lint
        
    - name: Setup Testing Sandbox
      run: mkdir -p /tmp/ai-commons-test
      
    - name: Test Cursor Compilation (Specific Ecosystems)
      run: |
        cd /tmp/ai-commons-test
        node $GITHUB_WORKSPACE/bin/cli.js --editor=cursor --language=react,python
        
        # Verify that files were deployed correctly
        if [ ! -d "/tmp/ai-commons-test/.cursor/rules" ]; then exit 1; fi
        
    - name: Test Antigravity Compilation (All Ecosystems natively)
      run: |
        cd /tmp/ai-commons-test
        node $GITHUB_WORKSPACE/bin/cli.js --editor=antigravity --language=""
        
        # Verify that files were deployed correctly
        if [ ! -d "/tmp/ai-commons-test/.agents/personas" ]; then exit 1; fi
        
    - name: Test Copilot Compilation (Flat Concatenation)
      run: |
        cd /tmp/ai-commons-test
        node $GITHUB_WORKSPACE/bin/cli.js --editor=copilot --language=react
        
        # Verify that the flat concatenation file was strictly generated
        if [ ! -f "/tmp/ai-commons-test/.github/copilot-instructions.md" ]; then exit 1; fi
