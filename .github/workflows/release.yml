name: Automated Release (Versioning & PR)

on:
  workflow_dispatch: # Actions only run when you manually click "Run workflow" in GitHub

jobs:
  draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push the new release branch
      pull-requests: write  # Needed to create the PR

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm install

      - name: Run Release Bumps (No Commit/Tag)
        # Use --skip.commit and --skip.tag so standard-version just modifies files locally
        run: npm run release -- --skip.commit --skip.tag

      - name: Fix RELEASE.md Headings (Branding & Lint)
        run: |
          # Change ### [version] to ## [vversion] to satisfy MD001 and branding
          sed -i 's/### \[/## \[v/g' RELEASE.md
          # Catch cases where it's not linked
          sed -i 's/## /## v/g' RELEASE.md || true
          # Fix double-v if it occurred
          sed -i 's/## vv/## v/g' RELEASE.md
          npm run lint:fix || true

      - name: Extract New Version Payload
        id: versioning
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        env:
          HUSKY: 0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): bump version to ${{ steps.versioning.outputs.NEW_VERSION }}"
          branch: "release/${{ steps.versioning.outputs.NEW_VERSION }}"
          base: "main"
          title: "🚀 Release ${{ steps.versioning.outputs.NEW_VERSION }}"
          body: |
            ## Automated Release Proposal
            This PR was explicitly generated by GitHub Actions to properly safely package and release version **${{ steps.versioning.outputs.NEW_VERSION }}** without overriding branch protection.
            
            Please review the `RELEASE.md` and `package.json` updates below. Merging this PR will publish the new version directly onto the \`main\` branch. Once merged, create a GitHub Release against the new tag.
          labels: "release, automated pr"
