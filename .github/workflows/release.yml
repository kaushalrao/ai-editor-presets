name: Automated Release (Versioning & GitHub Release)

on:
  push:
    branches:
      - main

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Run Release (Bump & Tag)
        run: npm run release

      - name: Fix RELEASE.md Headings (Branding & Lint)
        run: |
          # Change ### [version] to ## [vversion] to satisfy MD001 and branding
          sed -i 's/### \[/## \[v/g' RELEASE.md
          # Catch cases where it's not linked
          sed -i 's/## /## v/g' RELEASE.md || true
          # Fix double-v if it occurred
          sed -i 's/## vv/## v/g' RELEASE.md
          npm run lint:fix || true

      - name: Commit & Push Metadata
        id: push_metadata
        run: |
          git add RELEASE.md package.json package-lock.json
          git commit --amend --no-edit || echo "No metadata changes to amend"
          git push -f --follow-tags origin main
          # Extract version to use as tag
          VERSION=$(node -p "require('./package.json').version")
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Publish Official GitHub UI Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.push_metadata.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
