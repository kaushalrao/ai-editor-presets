name: Automated Version Bump

on:
  push:
    branches:
      - main

jobs:
  version-bump:
    if: "!contains(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Run Release
        run: npm run release

      - name: Fix RELEASE.md Headings (Lint Correction)
        run: |
          # Change ### [version] to ## [vversion] to satisfy MD001 and branding
          sed -i 's/### \[/## \[v/g' RELEASE.md
          npm run lint:fix || true

      - name: Commit Lint Fixes
        run: |
          git add RELEASE.md
          git commit --amend --no-edit || echo "No lint changes to amend"

      - name: Push Changes
        run: |
          git push -f --follow-tags origin main
