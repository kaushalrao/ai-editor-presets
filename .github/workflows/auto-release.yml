name: Automated GitHub UI Release

on:
  push:
    tags:
      - 'v*' # Actively triggers exclusively when tags like `v1.0.0` or `v2.4.1` arrive via git push --follow-tags

jobs:
  build-and-publish-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential permission needed to allow GitHub Actions to securely write to your repository's Releases page
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so it can reliably isolate generating only the newest notes
          
      - name: Publish Official GitHub UI Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Magically tells GitHub to explicitly compare the commit graph to the previous tag and instantly build a beautiful, rich Markdown changelog list specifically for this update!
          draft: false
          prerelease: false
